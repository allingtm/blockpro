name: blockpro
description: "BlockPro Flutter app with Bubble.io backend."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Theme
  flex_color_scheme: ^8.4.0

  # State management
  flutter_riverpod: ^2.5.0

  # Routing
  go_router: ^14.0.0

  # HTTP & API
  http: ^1.2.0

  # Reactive streams
  rxdart: ^0.28.0

  # Environment
  flutter_dotenv: ^5.1.0

  # Local storage
  shared_preferences: ^2.2.0

  # App info
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - .env

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  web:
    generate: true
  image_path: "assets/images/app_launcher_icon.png"
