name: blockpro
description: "BlockPro Flutter app with Bubble.io backend."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Theme
  flex_color_scheme: ^8.4.0

  # State management
  flutter_riverpod: ^2.5.0

  # Routing
  go_router: ^14.0.0

  # HTTP & API
  http: ^1.2.0

  # Connectivity detection
  connectivity_plus: ^6.1.0

  # Reactive streams
  rxdart: ^0.28.0

  # Environment
  flutter_dotenv: ^5.1.0

  # Local storage
  shared_preferences: ^2.2.0

  # Image capture
  image_picker: ^1.1.0

  # QR / barcode scanning (asset QR codes)
  mobile_scanner: ^7.0.0

  # Open external URLs (asset tooltip source links)
  url_launcher: ^6.3.0

  # App info
  package_info_plus: ^8.0.0

  # SQLite / Drift ORM
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  drift_dev: ^2.24.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/app_launcher_icon.png

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  web:
    generate: true
  image_path: "assets/images/app_launcher_icon.png"
